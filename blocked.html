<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Accesso bloccato</title>
<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 80px 20px; background: #fdf0f0; color: #333; }
h1 { color: #e74c3c; font-size: 2em; margin-bottom: 20px; }
p { font-size: 1.1em; max-width: 600px; margin: 0 auto 10px; }
.box { background: white; border-radius: 8px; padding: 40px; max-width: 700px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="box">
    <h1>Accesso bloccato dal docente</h1>
    <p>Questo sito non e' accessibile durante la verifica.</p>
    <p style="color:#888; font-size:0.9em; margin-top:30px">Se pensi sia un errore, chiedi al docente.</p>
</div>
</body>
</html>
